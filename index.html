<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <title>לקוחות וידאו דיזיין</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <img src="assets/logo-silver.jpg" class="login-logo-main" alt="Video Design">
        <img src="assets/sub-silver.png" class="login-logo-sub" alt="Management">
        
        <div id="user-btns" class="user-grid-silver"></div>

        <div id="pass-area" style="display: none; margin-top: 20px;">
            <input type="password" id="pass-inp" class="finp login-pass-inp" placeholder="••••">
            <p id="pass-err" style="display:none; color:#ff4d4d; font-size:13px; margin-top:10px;">סיסמה שגויה</p>
        </div>

        <button class="login-enter-btn" id="login-enter-btn" onclick="window.doLogin()">כנס</button>
    </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
