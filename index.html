<div class="pg" id="pg-settings">
    <div class="ph">
      <div style="display:flex; align-items:center; gap:14px;">
        <div style="font-size:32px; line-height:1;">⚙️</div>
        <div><div class="pt">הגדרות</div><div class="ps">ניהול מערכת והתאמה אישית</div></div>
      </div>
    </div>
    <div class="settings-grid">
      
      <div class="tw settings-panel">
        <div class="stit">🏢 פרטי החברה ויומן</div>
        <button class="btn bp" style="width:100%" onclick="saveSettings()">💾 שמור הגדרות</button>
        
        <div class="stit" style="margin-top:30px">🔔 התראות פוש</div>
        <button class="btn bs" style="width:100%" onclick="requestNotificationPermission()">🔔 הפעל התראות במכשיר זה</button>
        
        <div id="token-display-area" style="display:none; margin-top:15px;">
            <label class="flbl" style="font-size: 11px; color: var(--tx3);">מזהה מכשיר ייחודי (Token):</label>
            <textarea id="device-token" class="finp" readonly rows="3" style="font-size:10px; background:rgba(0,0,0,0.1); border:1px solid var(--brd);"></textarea>
            <button class="btn bs btn-sm" style="margin-top:5px; width:100%;" onclick="navigator.clipboard.writeText(document.getElementById('device-token').value); toast('הועתק ללוח! ✅')">העתק Token</button>
        </div>
      </div>
      </div>
  </div>
